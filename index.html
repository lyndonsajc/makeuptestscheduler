<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Make-up Test Scheduler</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      background: #f4f6f8;
      color: #222;
    }

    header {
      background: #1f2937;
      color: white;
      padding: 18px;
      text-align: center;
    }

    main {
      max-width: 1200px;
      margin: auto;
      padding: 20px;
    }

    .tabs {
      display: flex;
      gap: 10px;
      margin-bottom: 20px;
      flex-wrap: wrap;
    }

    button {
      border: none;
      padding: 10px 14px;
      border-radius: 8px;
      cursor: pointer;
      font-weight: bold;
    }

    .tab-btn {
      background: #d1d5db;
    }

    .tab-btn.active {
      background: #2563eb;
      color: white;
    }

    .card {
      background: white;
      border-radius: 12px;
      padding: 18px;
      margin-bottom: 18px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
    }

    label {
      font-weight: bold;
      display: block;
      margin-top: 12px;
    }

    input, textarea, select {
      width: 100%;
      padding: 10px;
      margin-top: 5px;
      border: 1px solid #ccc;
      border-radius: 8px;
      box-sizing: border-box;
    }

    textarea {
      min-height: 70px;
    }

    .submit-btn {
      background: #16a34a;
      color: white;
      margin-top: 16px;
      width: 100%;
    }

    .update-btn {
      background: #2563eb;
      color: white;
      margin-top: 10px;
    }

    .copy-btn {
      background: #f59e0b;
      color: white;
      margin-top: 8px;
    }

    .delete-btn {
      background: #dc2626;
      color: white;
      margin-top: 8px;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
      gap: 14px;
    }

    .status {
      display: inline-block;
      padding: 4px 8px;
      border-radius: 999px;
      background: #e5e7eb;
      font-size: 12px;
      font-weight: bold;
    }

    .hidden {
      display: none;
    }

    .small {
      font-size: 13px;
      color: #555;
    }

    .success {
      color: #15803d;
      font-weight: bold;
      margin-top: 10px;
    }

    .error {
      color: #dc2626;
      font-weight: bold;
      margin-top: 10px;
    }
  </style>
</head>

<body>
  <header>
    <h1>Make-up Test Scheduler</h1>
    <p>For students who missed a test with valid reason</p>
  </header>

  <main>
    <div class="tabs">
      <button class="tab-btn active" onclick="showTab('student')">Student Submission</button>
      <button class="tab-btn" onclick="showTab('teacher')">Teacher Dashboard</button>
    </div>

    <section id="studentTab">
      <div class="card">
        <h2>Student Submission Form</h2>

        <label>Full Name</label>
        <input id="studentName" placeholder="e.g. Tan Kai Ming" />

        <label>Class</label>
        <input id="className" placeholder="e.g. 26S21" />

        <label>Email Address</label>
        <input id="studentEmail" type="email" placeholder="e.g. student@school.edu.sg" />

        <label>Phone Number</label>
        <input id="phone" placeholder="e.g. 91234567" />

        <label>Missed Test / Subject</label>
        <input id="subject" placeholder="e.g. H2 Economics WA2" />

        <label>Reason for Missing Test</label>
        <textarea id="reason" placeholder="e.g. MC / approved school event / valid reason"></textarea>

        <label>Class Teacher Name</label>
        <input id="classTeacher" placeholder="e.g. Mr Chua" />

        <label>Class Teacher Email</label>
        <input id="classTeacherEmail" type="email" placeholder="e.g. teacher@moe.edu.sg" />

        <label>Available Slot 1</label>
        <input id="slot1" placeholder="e.g. Tue 4 Jun, 3.00pm - 4.00pm" />

        <label>Available Slot 2</label>
        <input id="slot2" placeholder="e.g. Wed 5 Jun, 2.30pm - 3.30pm" />

        <label>Available Slot 3</label>
        <input id="slot3" placeholder="e.g. Thu 6 Jun, 4.00pm - 5.00pm" />

        <button class="submit-btn" onclick="submitRequest()">Submit Request</button>

        <div id="studentMsg"></div>
      </div>
    </section>

    <section id="teacherTab" class="hidden">
      <div class="card">
        <h2>Teacher Dashboard</h2>
        <p class="small">Supervising teacher may be different from class teacher.</p>
        <button class="update-btn" onclick="loadRequests()">Refresh Dashboard</button>
        <div id="teacherMsg"></div>
      </div>

      <div id="requestsList"></div>
    </section>
  </main>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.2.1/firebase-app.js";

    import {
      getFirestore,
      collection,
      addDoc,
      getDocs,
      updateDoc,
      deleteDoc,
      doc,
      serverTimestamp,
      query,
      orderBy
    } from "https://www.gstatic.com/firebasejs/12.2.1/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyDzRkG4vo4ju80BAiZ7NGT7qK-5ZW0R2Bk",
      authDomain: "makeuptestscheduler-612e1.firebaseapp.com",
      projectId: "makeuptestscheduler-612e1",
      storageBucket: "makeuptestscheduler-612e1.firebasestorage.app",
      messagingSenderId: "1011920732210",
      appId: "1:1011920732210:web:93a201b642cbcdf97afc2b"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    window.showTab = function(tab) {
      document.getElementById("studentTab").classList.add("hidden");
      document.getElementById("teacherTab").classList.add("hidden");

      document.querySelectorAll(".tab-btn").forEach(btn => {
        btn.classList.remove("active");
      });

      if (tab === "student") {
        document.getElementById("studentTab").classList.remove("hidden");
        document.querySelectorAll(".tab-btn")[0].classList.add("active");
      } else {
        document.getElementById("teacherTab").classList.remove("hidden");
        document.querySelectorAll(".tab-btn")[1].classList.add("active");
        loadRequests();
      }
    };

    window.submitRequest = async function() {
      const studentMsg = document.getElementById("studentMsg");
      studentMsg.innerHTML = "";

      const data = {
        studentName: document.getElementById("studentName").value.trim(),
        className: document.getElementById("className").value.trim(),
        studentEmail: document.getElementById("studentEmail").value.trim(),
        phone: document.getElementById("phone").value.trim(),
        subject: document.getElementById("subject").value.trim(),
        reason: document.getElementById("reason").value.trim(),
        classTeacher: document.getElementById("classTeacher").value.trim(),
        classTeacherEmail: document.getElementById("classTeacherEmail").value.trim(),
        slot1: document.getElementById("slot1").value.trim(),
        slot2: document.getElementById("slot2").value.trim(),
        slot3: document.getElementById("slot3").value.trim(),

        supervisingTeacher: "",
        supervisingTeacherEmail: "",
        confirmedSlot: "",
        venue: "",
        teacherRemarks: "",
        status: "Pending",
        createdAt: serverTimestamp()
      };

      if (!data.studentName || !data.className || !data.studentEmail || !data.phone || !data.subject || !data.reason || !data.slot1 || !data.slot2 || !data.slot3) {
        studentMsg.innerHTML = `<div class="error">Please complete all required fields.</div>`;
        return;
      }

      try {
        await addDoc(collection(db, "makeupRequests"), data);

        studentMsg.innerHTML = `<div class="success">Submitted successfully. Your teacher will arrange a make-up test slot.</div>`;

        document.querySelectorAll("#studentTab input, #studentTab textarea").forEach(el => el.value = "");
      } catch (error) {
        console.error(error);
        studentMsg.innerHTML = `<div class="error">Error submitting request. Check Firebase setup.</div>`;
      }
    };

    window.loadRequests = async function() {
      const list = document.getElementById("requestsList");
      const teacherMsg = document.getElementById("teacherMsg");

      list.innerHTML = "";
      teacherMsg.innerHTML = "Loading...";

      try {
        const q = query(collection(db, "makeupRequests"), orderBy("createdAt", "desc"));
        const snapshot = await getDocs(q);

        teacherMsg.innerHTML = `<div class="success">${snapshot.size} request(s) loaded.</div>`;

        if (snapshot.empty) {
          list.innerHTML = `<div class="card">No make-up test requests yet.</div>`;
          return;
        }

        snapshot.forEach(docSnap => {
          const d = docSnap.data();
          const id = docSnap.id;

          const card = document.createElement("div");
          card.className = "card";

          card.innerHTML = `
            <h3>${d.studentName || ""} <span class="status">${d.status || "Pending"}</span></h3>

            <div class="grid">
              <div>
                <p><b>Class:</b> ${d.className || ""}</p>
                <p><b>Email:</b> ${d.studentEmail || ""}</p>
                <p><b>Phone:</b> ${d.phone || ""}</p>
                <p><b>Missed Test:</b> ${d.subject || ""}</p>
              </div>

              <div>
                <p><b>Class Teacher:</b> ${d.classTeacher || "-"}</p>
                <p><b>Class Teacher Email:</b> ${d.classTeacherEmail || "-"}</p>
                <p><b>Reason:</b> ${d.reason || ""}</p>
              </div>

              <div>
                <p><b>Slot 1:</b> ${d.slot1 || ""}</p>
                <p><b>Slot 2:</b> ${d.slot2 || ""}</p>
                <p><b>Slot 3:</b> ${d.slot3 || ""}</p>
              </div>
            </div>

            <hr>

            <label>Supervising Teacher Name</label>
            <input id="supTeacher-${id}" value="${d.supervisingTeacher || ""}" placeholder="e.g. Ms Lim" />

            <label>Supervising Teacher Email</label>
            <input id="supEmail-${id}" value="${d.supervisingTeacherEmail || ""}" placeholder="e.g. teacher@moe.edu.sg" />

            <label>Confirmed Slot</label>
            <select id="confirmedSlot-${id}">
              <option value="">Select confirmed slot</option>
              <option value="${d.slot1 || ""}" ${d.confirmedSlot === d.slot1 ? "selected" : ""}>${d.slot1 || "Slot 1"}</option>
              <option value="${d.slot2 || ""}" ${d.confirmedSlot === d.slot2 ? "selected" : ""}>${d.slot2 || "Slot 2"}</option>
              <option value="${d.slot3 || ""}" ${d.confirmedSlot === d.slot3 ? "selected" : ""}>${d.slot3 || "Slot 3"}</option>
            </select>

            <label>Venue</label>
            <input id="venue-${id}" value="${d.venue || ""}" placeholder="e.g. Room A205" />

            <label>Status</label>
            <select id="status-${id}">
              <option ${d.status === "Pending" ? "selected" : ""}>Pending</option>
              <option ${d.status === "Teacher Available" ? "selected" : ""}>Teacher Available</option>
              <option ${d.status === "Confirmed" ? "selected" : ""}>Confirmed</option>
              <option ${d.status === "Completed" ? "selected" : ""}>Completed</option>
            </select>

            <label>Teacher Remarks</label>
            <textarea id="remarks-${id}" placeholder="Any remarks">${d.teacherRemarks || ""}</textarea>

            <button class="update-btn" onclick="updateRequest('${id}')">Update Request</button>
            <button class="copy-btn" onclick="copyStudentEmail('${id}')">Copy Email to Student</button>
            <button class="copy-btn" onclick="copyTeacherEmail('${id}')">Copy Email to Supervising Teacher</button>
            <button class="delete-btn" onclick="deleteRequest('${id}')">Delete Request</button>
          `;

          list.appendChild(card);
        });

      } catch (error) {
        console.error(error);
        teacherMsg.innerHTML = `<div class="error">Error loading dashboard. Check Firestore rules.</div>`;
      }
    };

    window.updateRequest = async function(id) {
      const updateData = {
        supervisingTeacher: document.getElementById(`supTeacher-${id}`).value.trim(),
        supervisingTeacherEmail: document.getElementById(`supEmail-${id}`).value.trim(),
        confirmedSlot: document.getElementById(`confirmedSlot-${id}`).value,
        venue: document.getElementById(`venue-${id}`).value.trim(),
        status: document.getElementById(`status-${id}`).value,
        teacherRemarks: document.getElementById(`remarks-${id}`).value.trim()
      };

      try {
        await updateDoc(doc(db, "makeupRequests", id), updateData);
        alert("Request updated.");
        loadRequests();
      } catch (error) {
        console.error(error);
        alert("Error updating request.");
      }
    };

    window.copyStudentEmail = async function(id) {
      const snap = await getDocs(collection(db, "makeupRequests"));
      let record = null;

      snap.forEach(docSnap => {
        if (docSnap.id === id) record = docSnap.data();
      });

      if (!record) return;

      const emailText = `
Subject: Make-up Test Arrangement

Dear ${record.studentName},

Your make-up test has been arranged.

Test: ${record.subject}
Confirmed slot: ${document.getElementById(`confirmedSlot-${id}`).value}
Venue: ${document.getElementById(`venue-${id}`).value}
Supervising teacher: ${document.getElementById(`supTeacher-${id}`).value}

Please be punctual and bring the necessary materials.

Thank you.
      `.trim();

      await navigator.clipboard.writeText(emailText);
      alert("Email to student copied.");
    };

    window.copyTeacherEmail = async function(id) {
      const snap = await getDocs(collection(db, "makeupRequests"));
      let record = null;

      snap.forEach(docSnap => {
        if (docSnap.id === id) record = docSnap.data();
      });

      if (!record) return;

      const emailText = `
Subject: Make-up Test Supervision

Dear ${document.getElementById(`supTeacher-${id}`).value},

Thank you for helping to supervise the make-up test.

Student: ${record.studentName}
Class: ${record.className}
Test: ${record.subject}
Confirmed slot: ${document.getElementById(`confirmedSlot-${id}`).value}
Venue: ${document.getElementById(`venue-${id}`).value}

Student email: ${record.studentEmail}
Student phone: ${record.phone}

Thank you.
      `.trim();

      await navigator.clipboard.writeText(emailText);
      alert("Email to supervising teacher copied.");
    };

    window.deleteRequest = async function(id) {
      if (!confirm("Delete this request?")) return;

      try {
        await deleteDoc(doc(db, "makeupRequests", id));
        alert("Deleted.");
        loadRequests();
      } catch (error) {
        console.error(error);
        alert("Error deleting request.");
      }
    };
  </script>
</body>
</html>
